# Plane.so Community Edition — adaptado do compose oficial (makeplane/plane)
# Uso: docker compose up -d   →   http://localhost

x-db-env: &db-env
  PGHOST: plane-db
  PGDATABASE: ${POSTGRES_DB:-plane}
  POSTGRES_USER: ${POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plane}
  POSTGRES_DB: ${POSTGRES_DB:-plane}
  POSTGRES_PORT: 5432
  PGDATA: /var/lib/postgresql/data

x-redis-env: &redis-env
  REDIS_HOST: plane-redis
  REDIS_PORT: 6379
  REDIS_URL: redis://plane-redis:6379/

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-access-key}
  MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-secret-key}

x-aws-s3-env: &aws-s3-env
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-access-key}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-secret-key}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN:-localhost}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
  LISTEN_HTTP_PORT: ${LISTEN_HTTP_PORT:-80}
  LISTEN_HTTPS_PORT: 443
  BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
  SITE_ADDRESS: ":80"

x-mq-env: &mq-env
  RABBITMQ_HOST: plane-mq
  RABBITMQ_PORT: 5672
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-plane}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-plane}

x-live-env: &live-env
  API_BASE_URL: http://api:8000
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:?defina no .env}

x-app-env: &app-env
  WEB_URL: ${WEB_URL:-http://localhost}
  DEBUG: "0"
  GUNICORN_WORKERS: 1
  USE_MINIO: "1"
  DATABASE_URL: postgresql://${POSTGRES_USER:-plane}:${POSTGRES_PASSWORD:-plane}@plane-db/${POSTGRES_DB:-plane}
  SECRET_KEY: ${SECRET_KEY:?defina no .env}
  AMQP_URL: amqp://${RABBITMQ_USER:-plane}:${RABBITMQ_PASSWORD:-plane}@plane-mq:5672/${RABBITMQ_VHOST:-plane}
  API_KEY_RATE_LIMIT: 60/minute
  MINIO_ENDPOINT_SSL: "0"
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:?defina no .env}

services:
  # ── Frontends ──────────────────────────────────────────────
  web:
    image: makeplane/plane-frontend:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on: [api, worker]

  space:
    image: makeplane/plane-space:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on: [api, worker, web]

  admin:
    image: makeplane/plane-admin:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on: [api, web]

  live:
    image: makeplane/plane-live:${APP_RELEASE:-stable}
    restart: unless-stopped
    environment:
      <<: [*live-env, *redis-env]
    depends_on: [api, web]

  # ── Backend (Django) ───────────────────────────────────────
  api:
    image: makeplane/plane-backend:${APP_RELEASE:-stable}
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    volumes:
      - logs_api:/code/plane/logs
    depends_on: [plane-db, plane-redis, plane-mq]

  worker:
    image: makeplane/plane-backend:${APP_RELEASE:-stable}
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    volumes:
      - logs_worker:/code/plane/logs
    depends_on: [api, plane-db, plane-redis, plane-mq]

  beat-worker:
    image: makeplane/plane-backend:${APP_RELEASE:-stable}
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    volumes:
      - logs_beat-worker:/code/plane/logs
    depends_on: [api, plane-db, plane-redis, plane-mq]

  migrator:
    image: makeplane/plane-backend:${APP_RELEASE:-stable}
    command: ./bin/docker-entrypoint-migrator.sh
    restart: on-failure
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    volumes:
      - logs_migrator:/code/plane/logs
    depends_on: [plane-db, plane-redis]

  # ── Infraestrutura ─────────────────────────────────────────
  plane-db:
    image: postgres:15.7-alpine
    ports:
      - "5433:5432"   # 5433 para não conflitar com um Postgres local
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    environment:
      <<: *mq-env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  plane-minio:
    image: minio/minio:latest
    command: server /export --console-address ":9090"
    restart: unless-stopped
    environment:
      <<: *minio-env
    volumes:
      - uploads:/export

  # ── Proxy reverso (porta de entrada única) ─────────────────
  proxy:
    image: makeplane/plane-proxy:${APP_RELEASE:-stable}
    restart: unless-stopped
    environment:
      <<: *proxy-env
    ports:
      - "${LISTEN_HTTP_PORT:-80}:80"
    volumes:
      - proxy_config:/config
      - proxy_data:/data
    depends_on: [web, api, space, admin, live]

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  uploads:
  logs_api:
  logs_worker:
  logs_beat-worker:
  logs_migrator:
  proxy_config:
  proxy_data:
